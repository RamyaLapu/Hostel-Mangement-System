{% extends 'base.html' %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="row justify-content-center login-page bg-login align-items-center">
    <div class="col-md-5">
        <div class="card p-4 shadow-lg">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Admin Login</h2>
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" id="username" placeholder="Enter admin username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" id="password" placeholder="Enter password" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Login</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'forgot_password' %}">Forgot Password?</a> | <a href="{% url 'home' %}">Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
